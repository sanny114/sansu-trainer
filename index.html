<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算数トレーニング - どの計算かな？</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #5b21b6;
      --purple-light: #a78bfa;
      --pink: #ec4899;
      --pink-light: #f9a8d4;
      --mint: #10b981;
      --mint-light: #6ee7b7;
      --mint-bg: #ecfdf5;
      --orange: #f97316;
      --orange-light: #fdba74;
      --orange-bg: #fff7ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', sans-serif;
      background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 35%, #fce7f3 70%, #fdf2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 640px;
      animation: fadeIn 0.4s ease;
    }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 10px 36px rgba(124,58,237,0.16);
    }

    h1 {
      font-size: 1.9rem;
      color: var(--purple-dark);
      text-align: center;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: var(--pink);
      font-size: 0.95rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    /* マスコット吹き出し */
    .mascot-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin: 18px 0 22px;
    }
    .mascot-img {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      object-fit: contain;
      animation: bob 2.2s ease-in-out infinite;
    }
    .explain-head .mascot-img-sm {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-4px) rotate(-3deg); }
    }
    .mascot-bubble {
      position: relative;
      background: #f5f3ff;
      border: 2px solid var(--purple-light);
      border-radius: 16px;
      padding: 10px 16px;
      font-size: 0.92rem;
      color: var(--purple-dark);
      font-weight: bold;
      flex: 1;
    }
    .mascot-bubble::before {
      content: '';
      position: absolute;
      left: -8px;
      bottom: 12px;
      border: 7px solid transparent;
      border-right-color: var(--purple-light);
    }

    /* ステージカード（ミッション選択） */
    .stage-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stage-card {
      position: relative;
      background: linear-gradient(135deg, #f5f3ff, #fdf2f8);
      border: 3px solid var(--purple-light);
      border-radius: 22px;
      padding: 20px 22px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stage-card:hover, .stage-card:active {
      background: linear-gradient(135deg, var(--purple-light), var(--pink-light));
      border-color: var(--purple);
      transform: scale(1.02);
    }
    .stage-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .stage-card-body {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stage-icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .stage-card h2 { color: var(--purple-dark); font-size: 1.25rem; }
    .stage-card p { color: #7e22ce; font-size: 0.88rem; margin-top: 4px; }

    .stage-badge {
      display: inline-block;
      background: var(--purple);
      color: white;
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .stage-difficulty { display: flex; gap: 2px; }
    .star-icon-sm { width: 18px; height: 18px; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 16px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      color: var(--purple);
      font-size: 0.88rem;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .progress-bar {
      background: #ede9fe;
      border-radius: 10px;
      height: 12px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      height: 100%;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* Trick banner */
    .trick-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--orange), #fb923c);
      color: white;
      text-align: center;
      border-radius: 16px;
      padding: 10px 20px;
      font-size: 1.02rem;
      font-weight: bold;
      margin-bottom: 16px;
      animation: pulse 1s ease infinite alternate;
    }
    .trick-banner img { width: 32px; height: 32px; flex-shrink: 0; }
    @keyframes pulse {
      from { box-shadow: 0 0 0 rgba(249,115,22,0.4); }
      to   { box-shadow: 0 0 16px rgba(249,115,22,0.6); }
    }

    /* Question */
    .question-text {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #3b0764;
      font-weight: bold;
    }

    /* Answer buttons */
    .answer-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 22px;
    }

    .answer-btn {
      padding: 20px 12px;
      border: 3px solid var(--purple-light);
      border-radius: 18px;
      background: white;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--purple-dark);
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 var(--purple-light);
    }
    .answer-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #f5f3ff, #fdf2f8);
      transform: translateY(-2px);
    }
    .answer-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 1px 0 var(--purple-light);
    }
    .answer-btn.correct {
      background: linear-gradient(135deg, var(--mint-light), #a7f3d0);
      border-color: var(--mint);
      color: #065f46;
      box-shadow: 0 4px 0 var(--mint);
      animation: popIn 0.3s ease;
    }
    .answer-btn.wrong {
      background: linear-gradient(135deg, var(--orange-light), #fed7aa);
      border-color: var(--orange);
      color: #9a3412;
      box-shadow: 0 4px 0 var(--orange);
      animation: shake 0.4s ease;
    }
    .answer-btn:disabled { cursor: default; }

    @keyframes popIn {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* Explanation panel */
    .explain-panel {
      display: none;
      margin-top: 20px;
      border-radius: 18px;
      padding: 16px 18px;
      animation: fadeIn 0.3s ease;
    }
    .explain-panel.correct-panel {
      background: var(--mint-bg);
      border: 2px solid var(--mint);
    }
    .explain-panel.wrong-panel {
      background: var(--orange-bg);
      border: 2px solid var(--orange);
    }
    .explain-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .explain-label {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .explain-panel.correct-panel .explain-label { color: #047857; }
    .explain-panel.wrong-panel .explain-label { color: #c2410c; }
    .explain-text { color: #4a4a4a; font-size: 0.92rem; line-height: 1.6; }

    .next-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: 0 4px 0 var(--purple-dark);
    }
    .next-btn:hover { transform: translateY(-1px); }
    .next-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--purple-dark); }

    /* Timer */
    .timer-num { font-size: 1.1rem; font-weight: bold; }

    /* Result screen */
    .result-title {
      text-align: center;
      font-size: 1.7rem;
      color: var(--purple-dark);
      margin-bottom: 4px;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
    }
    .star-icon { width: 44px; height: 44px; }
    .result-comment { text-align: center; }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 18px 0 20px;
    }
    .stat-box {
      background: #f5f3ff;
      border-radius: 16px;
      padding: 14px 20px;
      text-align: center;
      min-width: 84px;
    }
    .stat-num { font-size: 1.9rem; font-weight: bold; color: var(--purple-dark); }
    .stat-label { font-size: 0.78rem; color: var(--pink); font-weight: bold; }

    .wrong-list { margin-bottom: 20px; }
    .wrong-list h3 { color: var(--purple-dark); font-size: 0.95rem; margin-bottom: 10px; }
    .wrong-item {
      background: var(--orange-bg);
      border-left: 4px solid var(--orange);
      border-radius: 0 12px 12px 0;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 0.88rem;
    }
    .wrong-item .correct-ans {
      font-weight: bold;
      color: #c2410c;
      margin-top: 4px;
    }

    .result-buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn-primary {
      padding: 16px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--purple-dark);
    }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--purple-dark); }
    .btn-secondary {
      padding: 13px;
      background: white;
      color: var(--purple);
      border: 2.5px solid var(--purple-light);
      border-radius: 18px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #f5f3ff; }
  </style>
</head>
<body>

<!-- ミッション選択画面 -->
<div class="screen active card" id="screenTitle">
  <h1>どの計算？算数ミッション</h1>
  <p class="subtitle">文章題を読んで、つかう計算を当てよう！</p>

  <div class="mascot-row">
    <img class="mascot-img" src="assets/mascot-normal.png" alt="ハカセ">
    <div class="mascot-bubble" id="titleMascotText">どっちのミッションにチャレンジする？</div>
  </div>

  <div class="stage-cards">
    <div class="stage-card" onclick="startGame(2)">
      <div class="stage-card-top">
        <span class="stage-badge">ミッション1</span>
        <span class="stage-difficulty">
          <img class="star-icon-sm" src="assets/star-filled.png" alt="★">
          <img class="star-icon-sm" src="assets/star-empty.png" alt="☆">
          <img class="star-icon-sm" src="assets/star-empty.png" alt="☆">
        </span>
      </div>
      <div class="stage-card-body">
        <img class="stage-icon" src="assets/mission-1-multiply-divide.png" alt="">
        <div>
          <h2>かけ算・わり算ミッション</h2>
          <p>2つから選ぶ！まずはここからマスターしよう</p>
        </div>
      </div>
    </div>
    <div class="stage-card" onclick="startGame(4)">
      <div class="stage-card-top">
        <span class="stage-badge">ミッション2</span>
        <span class="stage-difficulty">
          <img class="star-icon-sm" src="assets/star-filled.png" alt="★">
          <img class="star-icon-sm" src="assets/star-filled.png" alt="★">
          <img class="star-icon-sm" src="assets/star-filled.png" alt="★">
        </span>
      </div>
      <div class="stage-card-body">
        <img class="stage-icon" src="assets/mission-2-four-operations.png" alt="">
        <div>
          <h2>全部わかるかな？ミッション</h2>
          <p>たし算・ひき算・かけ算・わり算、ぜんぶから選ぶ上級ミッション</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 問題画面 -->
<div class="screen card" id="screenQuestion">
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">1 / 10</span>
      <span class="timer-num" id="timerText">0.0秒</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>

  <div class="trick-banner" id="trickBanner"><img src="assets/trick-alert.png" alt=""><span>ひっかけ問題だよ！気をつけて！</span><img src="assets/trick-alert.png" alt=""></div>

  <div class="mascot-row">
    <img class="mascot-img" src="assets/mascot-normal.png" alt="ハカセ" id="questionMascotImg">
    <div class="mascot-bubble question-text" id="questionText">問題文</div>
  </div>

  <div class="answer-buttons mode2" id="answerButtons"></div>

  <div class="explain-panel" id="explainPanel">
    <div class="explain-head">
      <img class="mascot-img-sm" id="explainMascotImg" src="assets/mascot-happy.png" alt="ハカセ">
      <span class="explain-label" id="explainLabel"></span>
    </div>
    <div class="explain-text" id="explainText"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次へ →</button>
  </div>
</div>

<!-- 結果画面 -->
<div class="screen card" id="screenResult">
  <div class="result-title">結果発表！</div>
  <div class="stars">
    <img class="star-icon" id="star1" src="assets/star-filled.png" alt="★">
    <img class="star-icon" id="star2" src="assets/star-filled.png" alt="★">
    <img class="star-icon" id="star3" src="assets/star-filled.png" alt="★">
  </div>
  <div class="mascot-row">
    <img class="mascot-img" src="assets/mascot-happy.png" alt="ハカセ" id="resultMascotImg">
    <div class="mascot-bubble result-comment" id="resultComment"></div>
  </div>
  <div class="result-stats">
    <div class="stat-box">
      <div class="stat-num" id="resultScore">0</div>
      <div class="stat-label">/ 10問 正解</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="resultTime">0</div>
      <div class="stat-label">秒</div>
    </div>
  </div>
  <div class="wrong-list" id="wrongList"></div>
  <div class="result-buttons">
    <button class="btn-primary" id="retryBtn" onclick="retryGame()">もう一度！</button>
    <button class="btn-secondary" onclick="showTitle()">モード選択に戻る</button>
  </div>
</div>

<script>
// ============================================================
// 問題データ
// ============================================================
const normalProblems = [
  // ---- かけ算 (25問) ----
  {id:1,  text:"りんごが1箱に6個入っています。4箱では何個になりますか？", answer:"かけ算", shortExplain:"1箱の数×箱の数＝全部の数 だからかけ算だよ！", longExplain:"「1つあたりの数 × いくつ分 ＝ 全体」がかけ算の形です。1箱に6個、4箱分なので 6×4 を計算します。", isTrick:false},
  {id:2,  text:"えんぴつが1セットに8本あります。5セット買うと、えんぴつは全部で何本ですか？", answer:"かけ算", shortExplain:"1セットの本数×セット数＝全部の本数 だからかけ算だよ！", longExplain:"「1セット8本」が「5セット分」なので、8×5 を計算します。同じ数のまとまりが何個分あるか、というときはかけ算です。", isTrick:false},
  {id:3,  text:"1本30円のガムを7本買いました。代金はいくらですか？", answer:"かけ算", shortExplain:"1本の値段×本数＝代金 だからかけ算だよ！", longExplain:"「1つの値段 × 個数 ＝ 代金」はかけ算の典型パターンです。30×7 を計算します。", isTrick:false},
  {id:4,  text:"教室のいすが1列に9脚ずつならんでいます。6列あると、いすは全部で何脚ですか？", answer:"かけ算", shortExplain:"1列の数×列の数＝全部の数 だからかけ算だよ！", longExplain:"「1列9脚」が「6列分」なので、9×6 を計算します。「ずつ」という言葉があるときはかけ算が多いです。", isTrick:false},
  {id:5,  text:"たまごが1パックに10個入っています。3パックでは何個になりますか？", answer:"かけ算", shortExplain:"1パックの個数×パック数＝全部の個数 だからかけ算だよ！", longExplain:"「1パック10個 × 3パック ＝ 30個」という形でかけ算になります。", isTrick:false},
  {id:6,  text:"1mの値段が80円のリボンを5m買いました。代金はいくらですか？", answer:"かけ算", shortExplain:"1mの値段×m数＝代金 だからかけ算だよ！", longExplain:"「1mあたり80円 × 5m ＝ 400円」という形のかけ算です。「1つあたり」がわかっていて、それがいくつ分かを求めるときはかけ算です。", isTrick:false},
  {id:7,  text:"子どもが1人に4枚ずつシールをくばります。8人にくばると、シールは何枚いりますか？", answer:"かけ算", shortExplain:"1人分のシール×人数＝必要な枚数 だからかけ算だよ！", longExplain:"「1人に4枚」が「8人分」なので 4×8 を計算します。「ずつ」があってそれが何人分かを求めるときはかけ算です。", isTrick:false},
  {id:8,  text:"ノートが1冊90円です。7冊買うと代金はいくらですか？", answer:"かけ算", shortExplain:"1冊の値段×冊数＝代金 だからかけ算だよ！", longExplain:"「1冊90円 × 7冊 ＝ 630円」というかけ算になります。", isTrick:false},
  {id:9,  text:"1日に25ページずつ本を読みます。4日間では何ページ読めますか？", answer:"かけ算", shortExplain:"1日のページ数×日数＝全部のページ数 だからかけ算だよ！", longExplain:"「1日25ページ × 4日 ＝ 100ページ」です。毎日同じ量がある（ずつ）ときはかけ算のサインです。", isTrick:false},
  {id:10, text:"花びんに花を6本ずつ入れます。花びんが5つあると、花は何本いりますか？", answer:"かけ算", shortExplain:"1つの花びんの本数×花びんの数＝全部の本数 だからかけ算だよ！", longExplain:"「1つに6本 × 5つ ＝ 30本」というかけ算になります。", isTrick:false},
  {id:11, text:"バスに30人乗れます。同じバスが4台あると、全部で何人乗れますか？", answer:"かけ算", shortExplain:"1台に乗れる人数×台数＝全部で乗れる人数 だからかけ算だよ！", longExplain:"「1台30人 × 4台 ＝ 120人」です。1台あたりの人数が決まっていて、台数分だからかけ算です。", isTrick:false},
  {id:12, text:"みかんが1かごに15個あります。7かごでは何個になりますか？", answer:"かけ算", shortExplain:"1かごの個数×かごの数＝全部の個数 だからかけ算だよ！", longExplain:"「1かご15個 × 7かご ＝ 105個」です。", isTrick:false},
  {id:13, text:"正方形の1辺の長さが7cmです。まわりの長さは何cmですか？", answer:"かけ算", shortExplain:"1辺の長さ×4辺＝まわりの長さ だからかけ算だよ！", longExplain:"正方形は4つの辺がすべて同じ長さなので 7×4 ＝ 28cm です。「同じ長さが4つ分」だからかけ算になります。", isTrick:false},
  {id:14, text:"横8cm、縦5cmの長方形の面積は何cm²ですか？", answer:"かけ算", shortExplain:"横×縦＝面積 だからかけ算だよ！", longExplain:"長方形の面積は「横 × 縦」で求めます。8×5 ＝ 40cm² です。", isTrick:false},
  {id:15, text:"1週間は7日です。6週間では何日ですか？", answer:"かけ算", shortExplain:"1週間の日数×週数＝全部の日数 だからかけ算だよ！", longExplain:"「7日 × 6週間 ＝ 42日」です。", isTrick:false},
  {id:16, text:"子ども1人に画用紙を5枚ずつ配ります。9人のクラスでは何枚必要ですか？", answer:"かけ算", shortExplain:"1人分の枚数×人数＝必要な枚数 だからかけ算だよ！", longExplain:"「1人5枚 × 9人 ＝ 45枚」です。", isTrick:false},
  {id:17, text:"りんごジュースが1本150mLです。6本分は何mLですか？", answer:"かけ算", shortExplain:"1本分のmL×本数＝全部のmL だからかけ算だよ！", longExplain:"「1本150mL × 6本 ＝ 900mL」です。", isTrick:false},
  {id:18, text:"縄跳びを1分間に50回とびます。3分間では何回とべますか？", answer:"かけ算", shortExplain:"1分間の回数×分数＝全部の回数 だからかけ算だよ！", longExplain:"「1分50回 × 3分 ＝ 150回」です。", isTrick:false},
  {id:19, text:"スタンプを1列に9個ならべます。6列では全部で何個ならびますか？", answer:"かけ算", shortExplain:"1列の個数×列の数＝全部の個数 だからかけ算だよ！", longExplain:"「1列9個 × 6列 ＝ 54個」です。", isTrick:false},
  {id:20, text:"ゼリーが1箱に12個入っています。5箱では何個になりますか？", answer:"かけ算", shortExplain:"1箱の個数×箱の数＝全部の個数 だからかけ算だよ！", longExplain:"「1箱12個 × 5箱 ＝ 60個」です。", isTrick:false},
  {id:21, text:"お弁当箱を1個280円で4個買いました。代金は全部でいくらですか？", answer:"かけ算", shortExplain:"1個の値段×個数＝代金 だからかけ算だよ！", longExplain:"「280円 × 4個 ＝ 1120円」です。", isTrick:false},
  {id:22, text:"1袋に400gの砂糖が入っています。5袋では何gになりますか？", answer:"かけ算", shortExplain:"1袋の重さ×袋の数＝全部の重さ だからかけ算だよ！", longExplain:"「400g × 5袋 ＝ 2000g」です。", isTrick:false},
  {id:23, text:"植木が1プランターに4株ずつ植えてあります。11プランターでは何株ですか？", answer:"かけ算", shortExplain:"1プランターの株数×プランター数＝全部の株数 だからかけ算だよ！", longExplain:"「4株 × 11プランター ＝ 44株」です。「ずつ」がついて同じ数のまとまりがいくつかあるときはかけ算です。", isTrick:false},
  {id:24, text:"長さ3mのロープが6本あります。全部の長さは何mですか？", answer:"かけ算", shortExplain:"1本の長さ×本数＝全部の長さ だからかけ算だよ！", longExplain:"「3m × 6本 ＝ 18m」です。", isTrick:false},
  {id:25, text:"1台のロボットが1時間に20個のパーツを組み立てます。3時間では何個組み立てられますか？", answer:"かけ算", shortExplain:"1時間の個数×時間＝全部の個数 だからかけ算だよ！", longExplain:"「1時間20個 × 3時間 ＝ 60個」です。1時間あたりの量 × 時間 の形はかけ算です。", isTrick:false},

  // ---- わり算 (25問) ----
  {id:26, text:"32個のあめを4人で同じ数ずつ分けると、1人何個になりますか？", answer:"わり算", shortExplain:"全部の数÷人数＝1人分の数 だからわり算だよ！", longExplain:"全体を同じ数ずつ分けるとき、1人分がいくつになるかを求めるのはわり算です。32÷4 ＝ 8個です。", isTrick:false},
  {id:27, text:"36枚の色紙を6人に同じ枚数ずつ配ると、1人何枚になりますか？", answer:"わり算", shortExplain:"全部の枚数÷人数＝1人分の枚数 だからわり算だよ！", longExplain:"「全体 ÷ 人数 ＝ 1人分」の形はわり算です。36÷6 ＝ 6枚です。", isTrick:false},
  {id:28, text:"56cmのリボンを7等分すると、1つ分の長さは何cmになりますか？", answer:"わり算", shortExplain:"全体の長さ÷等分数＝1つ分の長さ だからわり算だよ！", longExplain:"「等分」という言葉があれば、全体をいくつかに分けるのでわり算です。56÷7 ＝ 8cmです。", isTrick:false},
  {id:29, text:"48個のたまごを6個ずつ箱に入れると、箱は何箱いりますか？", answer:"わり算", shortExplain:"全部の個数÷1箱の個数＝箱の数 だからわり算だよ！", longExplain:"「全部 ÷ 1つ分の数 ＝ いくつ分」の形もわり算です。48÷6 ＝ 8箱です。", isTrick:false},
  {id:30, text:"45人の生徒を9つのグループに同じ人数ずつ分けると、1グループ何人になりますか？", answer:"わり算", shortExplain:"全体の人数÷グループ数＝1グループの人数 だからわり算だよ！", longExplain:"「45人 ÷ 9グループ ＝ 5人」です。全体を同じ数のグループに分けるのはわり算です。", isTrick:false},
  {id:31, text:"84mのロープを12mずつ切ると、何本できますか？", answer:"わり算", shortExplain:"全体の長さ÷1本分の長さ＝何本 だからわり算だよ！", longExplain:"「全体 ÷ 1つ分 ＝ いくつ分」の形はわり算です。84÷12 ＝ 7本です。", isTrick:false},
  {id:32, text:"35個のクッキーを7枚のお皿に同じ数ずつ乗せると、1皿何個ですか？", answer:"わり算", shortExplain:"全体の個数÷皿の数＝1皿の個数 だからわり算だよ！", longExplain:"「35個 ÷ 7皿 ＝ 5個」です。", isTrick:false},
  {id:33, text:"花が54本あります。6本ずつたばにすると、何束できますか？", answer:"わり算", shortExplain:"全体の本数÷1束の本数＝束の数 だからわり算だよ！", longExplain:"「54本 ÷ 6本 ＝ 9束」です。全体を1つ分の数で割ると、いくつ分になるかがわかります。", isTrick:false},
  {id:34, text:"120ページの本を1日15ページずつ読むと、何日で読み終わりますか？", answer:"わり算", shortExplain:"全部のページ÷1日のページ＝日数 だからわり算だよ！", longExplain:"「全体 ÷ 1日分 ＝ 日数」の形はわり算です。120÷15 ＝ 8日です。", isTrick:false},
  {id:35, text:"90cmのひもを10cmずつに切ると、何本になりますか？", answer:"わり算", shortExplain:"全体の長さ÷1本分の長さ＝本数 だからわり算だよ！", longExplain:"「90÷10 ＝ 9本」です。全体の量 ÷ 1つ分 ＝ 何個分 の形はわり算です。", isTrick:false},
  {id:36, text:"75個のあめを5人で平等に分けると、1人何個になりますか？", answer:"わり算", shortExplain:"全部の個数÷人数＝1人分の個数 だからわり算だよ！", longExplain:"「75÷5 ＝ 15個」です。「平等に分ける」「同じ数ずつ」はわり算のサインです。", isTrick:false},
  {id:37, text:"63Lの水を7つのバケツに同じ量ずつ入れると、1つのバケツに何Lですか？", answer:"わり算", shortExplain:"全体の量÷バケツの数＝1つ分の量 だからわり算だよ！", longExplain:"「63÷7 ＝ 9L」です。", isTrick:false},
  {id:38, text:"48枚のカードを6枚ずつたばにすると、何たばになりますか？", answer:"わり算", shortExplain:"全体の枚数÷1たばの枚数＝たばの数 だからわり算だよ！", longExplain:"「48÷6 ＝ 8たば」です。", isTrick:false},
  {id:39, text:"100円で20円のキャンディは何個買えますか？", answer:"わり算", shortExplain:"全部のお金÷1個の値段＝何個買えるか だからわり算だよ！", longExplain:"「100÷20 ＝ 5個」です。全体のお金を1個の値段で割ると何個買えるかがわかります。", isTrick:false},
  {id:40, text:"サッカー部員40人を5人ずつのチームにわけると、チームは何個できますか？", answer:"わり算", shortExplain:"全員の人数÷1チームの人数＝チーム数 だからわり算だよ！", longExplain:"「40÷5 ＝ 8チーム」です。", isTrick:false},
  {id:41, text:"プールを1日8Lずつ水を入れます。72L入れるには何日かかりますか？", answer:"わり算", shortExplain:"全体の量÷1日の量＝日数 だからわり算だよ！", longExplain:"「72÷8 ＝ 9日」です。全体 ÷ 1日分 ＝ 何日分 の形はわり算です。", isTrick:false},
  {id:42, text:"プリント96枚を1クラス12枚ずつ配ると、何クラスに配れますか？", answer:"わり算", shortExplain:"全体の枚数÷1クラスの枚数＝クラス数 だからわり算だよ！", longExplain:"「96÷12 ＝ 8クラス」です。", isTrick:false},
  {id:43, text:"1本240mLのジュースを3本持っています。同じコップに全部を同じ量ずつ分けると、コップが6個のとき1個何mLですか？", answer:"わり算", shortExplain:"全体のmL÷コップの数＝1個分のmL だからわり算だよ！", longExplain:"まず 240×3 ＝ 720mL。そして 720÷6 ＝ 120mLです。最後は「全体÷個数」のわり算です。", isTrick:false},
  {id:44, text:"60個のオレンジを1箱に10個ずつ入れると、何箱できますか？", answer:"わり算", shortExplain:"全体の個数÷1箱の個数＝箱の数 だからわり算だよ！", longExplain:"「60÷10 ＝ 6箱」です。", isTrick:false},
  {id:45, text:"144gのチョコレートを12人で等しく分けると、1人何gになりますか？", answer:"わり算", shortExplain:"全体のg÷人数＝1人分のg だからわり算だよ！", longExplain:"「144÷12 ＝ 12g」です。「等しく分ける」もわり算のサインです。", isTrick:false},
  {id:46, text:"棒が81cmあります。9cmずつに切ると、何本できますか？", answer:"わり算", shortExplain:"全体の長さ÷1本の長さ＝本数 だからわり算だよ！", longExplain:"「81÷9 ＝ 9本」です。", isTrick:false},
  {id:47, text:"遠足で80kmのコースを4日間で歩きます。1日あたり何km歩きますか？", answer:"わり算", shortExplain:"全体のkm÷日数＝1日あたりのkm だからわり算だよ！", longExplain:"「80÷4 ＝ 20km」です。「1日あたり」を求めるときは全体÷日数のわり算です。", isTrick:false},
  {id:48, text:"70人の参加者を7台のバスに同じ人数ずつ乗せると、1台何人になりますか？", answer:"わり算", shortExplain:"全体の人数÷台数＝1台の人数 だからわり算だよ！", longExplain:"「70÷7 ＝ 10人」です。", isTrick:false},
  {id:49, text:"リボンが108cmあります。9cmずつ切ると何本できますか？", answer:"わり算", shortExplain:"全体の長さ÷1本の長さ＝本数 だからわり算だよ！", longExplain:"「108÷9 ＝ 12本」です。", isTrick:false},
  {id:50, text:"おはじきが56個あります。8個ずつ袋に入れると、何袋できますか？", answer:"わり算", shortExplain:"全体の個数÷1袋の個数＝袋の数 だからわり算だよ！", longExplain:"「56÷8 ＝ 7袋」です。", isTrick:false},

  // ---- たし算 (25問) ----
  {id:51, text:"赤いボールが13個、青いボールが9個あります。ボールは全部で何個ですか？", answer:"たし算", shortExplain:"2つのものを合わせるときはたし算だよ！", longExplain:"「赤13個 ＋ 青9個 ＝ 22個」です。2つの量を合わせる（合計を求める）ときはたし算です。", isTrick:false},
  {id:52, text:"かごに梨が8個、りんごが11個入っています。果物は合わせて何個ですか？", answer:"たし算", shortExplain:"2種類のものを合わせるときはたし算だよ！", longExplain:"「8＋11 ＝ 19個」です。「合わせて」は合計を求めるのでたし算です。", isTrick:false},
  {id:53, text:"先週は本を16ページ読み、今週は21ページ読みました。2週間で何ページ読みましたか？", answer:"たし算", shortExplain:"2つの週のページ数を合わせるからたし算だよ！", longExplain:"「16 ＋ 21 ＝ 37ページ」です。期間を合わせた合計を求めるのはたし算です。", isTrick:false},
  {id:54, text:"バス停でバスを待っている人が7人いました。途中で5人乗ってきました。今、バスには何人いますか？", answer:"たし算", shortExplain:"もともとの人数に増えた人数を足すからたし算だよ！", longExplain:"「7＋5 ＝ 12人」です。人数が増えるときはたし算です。", isTrick:false},
  {id:55, text:"花が赤が24本、黄色が18本あります。全部で何本ですか？", answer:"たし算", shortExplain:"2種類の花を合わせるからたし算だよ！", longExplain:"「24＋18 ＝ 42本」です。", isTrick:false},
  {id:56, text:"弟は48ページ、姉は63ページの本を読みました。2人合わせて何ページ読みましたか？", answer:"たし算", shortExplain:"2人のページ数を合わせるからたし算だよ！", longExplain:"「48＋63 ＝ 111ページ」です。「合わせて」はたし算のサインです。", isTrick:false},
  {id:57, text:"冷蔵庫にみかんが14個あります。お母さんが8個買ってきました。今、みかんは何個ありますか？", answer:"たし算", shortExplain:"あった数に加わった数を足すからたし算だよ！", longExplain:"「14＋8 ＝ 22個」です。何かが増えるときはたし算です。", isTrick:false},
  {id:58, text:"学校の図書館に本が230冊あります。新しく45冊入りました。今、本は何冊ありますか？", answer:"たし算", shortExplain:"もとの冊数に増えた冊数を足すからたし算だよ！", longExplain:"「230＋45 ＝ 275冊」です。", isTrick:false},
  {id:59, text:"朝29人いたクラスに、転入生が3人来ました。クラスは何人になりましたか？", answer:"たし算", shortExplain:"もとの人数に増えた人数を足すからたし算だよ！", longExplain:"「29＋3 ＝ 32人」です。増える（加わる）のはたし算のサインです。", isTrick:false},
  {id:60, text:"Aの箱に35個、Bの箱に28個のビー玉が入っています。合計何個ですか？", answer:"たし算", shortExplain:"2つの箱のビー玉を合わせるからたし算だよ！", longExplain:"「35＋28 ＝ 63個」です。", isTrick:false},
  {id:61, text:"遠足でAコース3kmとBコース2kmを歩きました。全部で何km歩きましたか？", answer:"たし算", shortExplain:"2つのコースのkmを合わせるからたし算だよ！", longExplain:"「3＋2 ＝ 5km」です。", isTrick:false},
  {id:62, text:"工場で午前に56個、午後に74個の部品を作りました。1日で何個作りましたか？", answer:"たし算", shortExplain:"午前と午後の個数を合わせるからたし算だよ！", longExplain:"「56＋74 ＝ 130個」です。", isTrick:false},
  {id:63, text:"貯金箱に340円入っています。お小遣いをもらって180円増えました。今、貯金は何円ですか？", answer:"たし算", shortExplain:"もとのお金に増えた金額を足すからたし算だよ！", longExplain:"「340＋180 ＝ 520円」です。", isTrick:false},
  {id:64, text:"木が公園に17本あります。新たに9本植えました。公園の木は全部で何本ですか？", answer:"たし算", shortExplain:"もとの本数に植えた本数を足すからたし算だよ！", longExplain:"「17＋9 ＝ 26本」です。", isTrick:false},
  {id:65, text:"牛乳が冷蔵庫に2本、棚に3本あります。全部で何本ですか？", answer:"たし算", shortExplain:"2か所の本数を合わせるからたし算だよ！", longExplain:"「2＋3 ＝ 5本」です。", isTrick:false},
  {id:66, text:"バスケットボールの試合で第1クォーターに15点、第2クォーターに18点取りました。合計何点ですか？", answer:"たし算", shortExplain:"2つのクォーターの点数を合わせるからたし算だよ！", longExplain:"「15＋18 ＝ 33点」です。「合計」はたし算のサインです。", isTrick:false},
  {id:67, text:"お父さんの身長は172cm、お母さんの身長は158cmです。2人の身長を合わせると何cmですか？", answer:"たし算", shortExplain:"2人の身長を合わせるからたし算だよ！", longExplain:"「172＋158 ＝ 330cm」です。「合わせる」はたし算です。", isTrick:false},
  {id:68, text:"青いクレヨンが12本、赤いクレヨンが8本あります。全部で何本ですか？", answer:"たし算", shortExplain:"2種類のクレヨンを合わせるからたし算だよ！", longExplain:"「12＋8 ＝ 20本」です。", isTrick:false},
  {id:69, text:"電車に32人乗っていました。次の駅で15人乗ってきました。今、何人乗っていますか？", answer:"たし算", shortExplain:"乗っていた人数に乗ってきた人数を足すからたし算だよ！", longExplain:"「32＋15 ＝ 47人」です。人が増えるのはたし算です。", isTrick:false},
  {id:70, text:"文房具店でノートを120円、ペンを85円買いました。合計いくらですか？", answer:"たし算", shortExplain:"2つの値段を合わせるからたし算だよ！", longExplain:"「120＋85 ＝ 205円」です。", isTrick:false},
  {id:71, text:"理科の実験で砂を250gと水を300g混ぜます。全部の重さは何gですか？", answer:"たし算", shortExplain:"2つの重さを合わせるからたし算だよ！", longExplain:"「250＋300 ＝ 550g」です。", isTrick:false},
  {id:72, text:"1組の生徒は32人、2組の生徒は30人います。2クラス合わせると何人ですか？", answer:"たし算", shortExplain:"2クラスの人数を合わせるからたし算だよ！", longExplain:"「32＋30 ＝ 62人」です。", isTrick:false},
  {id:73, text:"畑にトマトが46個とキュウリが23個なっています。全部で何個ですか？", answer:"たし算", shortExplain:"2種類の野菜を合わせるからたし算だよ！", longExplain:"「46＋23 ＝ 69個」です。", isTrick:false},
  {id:74, text:"折り紙を昨日15枚、今日22枚折りました。2日で合計何枚折りましたか？", answer:"たし算", shortExplain:"2日分の枚数を合わせるからたし算だよ！", longExplain:"「15＋22 ＝ 37枚」です。", isTrick:false},
  {id:75, text:"自転車で今日は4km、明日は3km走る予定です。2日間で何km走りますか？", answer:"たし算", shortExplain:"2日分のkmを合わせるからたし算だよ！", longExplain:"「4＋3 ＝ 7km」です。", isTrick:false},

  // ---- ひき算 (25問) ----
  {id:76, text:"48個のあめのうち、12個を食べました。残りは何個ですか？", answer:"ひき算", shortExplain:"もとの数から使った数を引くからひき算だよ！", longExplain:"「48－12 ＝ 36個」です。何かが減るときや残りを求めるときはひき算です。", isTrick:false},
  {id:77, text:"バスに35人乗っていました。バス停で8人降りました。今、何人乗っていますか？", answer:"ひき算", shortExplain:"乗っていた人数から降りた人数を引くからひき算だよ！", longExplain:"「35－8 ＝ 27人」です。人が減るのはひき算です。", isTrick:false},
  {id:78, text:"500円持っていて、160円のおかしを買いました。おつりはいくらですか？", answer:"ひき算", shortExplain:"持っていたお金から使ったお金を引くからひき算だよ！", longExplain:"「500－160 ＝ 340円」です。「おつり」や「残り」を求めるのはひき算です。", isTrick:false},
  {id:79, text:"水が80L入るタンクに53L入っています。あと何L入りますか？", answer:"ひき算", shortExplain:"タンクの最大量から今の量を引くからひき算だよ！", longExplain:"「80－53 ＝ 27L」です。「あといくつ入るか（残り）」を求めるのはひき算です。", isTrick:false},
  {id:80, text:"シールが60枚あります。友だちに24枚あげました。残りは何枚ですか？", answer:"ひき算", shortExplain:"もとの枚数からあげた枚数を引くからひき算だよ！", longExplain:"「60－24 ＝ 36枚」です。「あげる」「使う」「食べる」など減るのはひき算です。", isTrick:false},
  {id:81, text:"リボンが90cmあります。45cm使いました。残りは何cmですか？", answer:"ひき算", shortExplain:"全体の長さから使った長さを引くからひき算だよ！", longExplain:"「90－45 ＝ 45cm」です。", isTrick:false},
  {id:82, text:"本が75冊あります。図書館に20冊返しました。今、何冊ありますか？", answer:"ひき算", shortExplain:"もとの冊数から返した冊数を引くからひき算だよ！", longExplain:"「75－20 ＝ 55冊」です。返す（減らす）のはひき算です。", isTrick:false},
  {id:83, text:"バスケの試合で相手チームは50点、わがチームは38点です。何点差ですか？", answer:"ひき算", shortExplain:"大きい点から小さい点を引いて差を出すからひき算だよ！", longExplain:"「50－38 ＝ 12点差」です。「差」を求めるときはひき算です。", isTrick:false},
  {id:84, text:"山の高さは1200mです。800mまで登りました。頂上まであと何mですか？", answer:"ひき算", shortExplain:"全体の高さから登った高さを引くからひき算だよ！", longExplain:"「1200－800 ＝ 400m」です。「あと何m」は残りを求めるのでひき算です。", isTrick:false},
  {id:85, text:"鉛筆が20本あります。友だちに7本貸しました。手元に何本残っていますか？", answer:"ひき算", shortExplain:"もとの本数から貸した本数を引くからひき算だよ！", longExplain:"「20－7 ＝ 13本」です。「貸す」も一時的に減るのでひき算です。", isTrick:false},
  {id:86, text:"公園に子どもが42人いました。16人が帰りました。残りは何人ですか？", answer:"ひき算", shortExplain:"いた人数から帰った人数を引くからひき算だよ！", longExplain:"「42－16 ＝ 26人」です。", isTrick:false},
  {id:87, text:"Aさんは150cm、Bさんは138cmです。どちらが何cm高いですか？（高さの差を求めましょう）", answer:"ひき算", shortExplain:"2人の身長の差を求めるからひき算だよ！", longExplain:"「150－138 ＝ 12cm」です。「差」「何cm高い・低い」はひき算です。", isTrick:false},

// ============================================================
// ゲーム状態
// ============================================================
let currentMode = 2;
let selectedQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongQuestions = [];
let timerInterval = null;
let elapsedMs = 0;
let timerStarted = false;

const MASCOT_CORRECT = ['やったね！その通り！', 'すごい！正解だよ！', 'バッチリ！正解！'];
const MASCOT_WRONG = ['おっと、ちがったよ。一緒に見てみよう！', 'うーん、もう一回考えてみよう！', '残念！でも理由を読めば次はわかるよ！'];

// ============================================================
// 画面切り替え
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showTitle() {
  clearInterval(timerInterval);
  showScreen('screenTitle');
}

// ============================================================
// ゲーム開始
// ============================================================
function startGame(mode) {
  currentMode = mode;
  score = 0;
  wrongQuestions = [];
  currentIndex = 0;
  elapsedMs = 0;
  timerStarted = false;
  clearInterval(timerInterval);

  const pool = mode === 2
    ? normalProblems.filter(p => p.answer === 'かけ算' || p.answer === 'わり算')
    : normalProblems;

  const shuffledPool = shuffle([...pool]);
  const normal9 = shuffledPool.slice(0, 9);
  const trick1 = shuffle([...trickProblems])[0];

  selectedQuestions = [...normal9, trick1];

  showScreen('screenQuestion');
  showQuestion();
}

function retryGame() {
  startGame(currentMode);
}

// ============================================================
// 問題表示
// ============================================================
function showQuestion() {
  const q = selectedQuestions[currentIndex];
  const total = selectedQuestions.length;

  // Progress
  document.getElementById('progressText').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / total) * 100}%`;

  // Trick banner (10問目 = index 9)
  const banner = document.getElementById('trickBanner');
  banner.style.display = q.isTrick ? 'flex' : 'none';
  document.getElementById('questionMascotImg').src = q.isTrick ? 'assets/mascot-surprised.png' : 'assets/mascot-normal.png';

  // Question text
  document.getElementById('questionText').textContent = q.text;

  // Buttons
  const btnArea = document.getElementById('answerButtons');
  btnArea.innerHTML = '';

  let options;
  if (currentMode === 2) {
    options = ['かけ算', 'わり算'];
  } else {
    options = shuffle(['たし算', 'ひき算', 'かけ算', 'わり算']);
  }

  btnArea.className = `answer-buttons ${currentMode === 2 ? 'mode2' : 'mode4'}`;

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(opt);
    btnArea.appendChild(btn);
  });

  // Hide explain panel
  const panel = document.getElementById('explainPanel');
  panel.style.display = 'none';
  panel.className = 'explain-panel';

  // Start timer on first question
  if (!timerStarted) {
    timerStarted = true;
    timerInterval = setInterval(() => {
      elapsedMs += 100;
      document.getElementById('timerText').textContent = (elapsedMs / 1000).toFixed(1) + '秒';
    }, 100);
  }
}

// ============================================================
// 答え選択
// ============================================================
function selectAnswer(selected) {
  const q = selectedQuestions[currentIndex];
  const isCorrect = selected === q.answer;

  // Disable all buttons
  document.querySelectorAll('.answer-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.answer) btn.classList.add('correct');
    if (btn.textContent === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Explain
  const panel = document.getElementById('explainPanel');
  panel.style.display = 'block';
  panel.className = isCorrect ? 'explain-panel correct-panel' : 'explain-panel wrong-panel';
  document.getElementById('explainMascotImg').src = isCorrect ? 'assets/mascot-happy.png' : 'assets/mascot-sad.png';
  document.getElementById('explainLabel').textContent = isCorrect
    ? MASCOT_CORRECT[Math.floor(Math.random() * MASCOT_CORRECT.length)]
    : MASCOT_WRONG[Math.floor(Math.random() * MASCOT_WRONG.length)];
  document.getElementById('explainText').textContent = isCorrect ? q.shortExplain : q.longExplain;

  // Score
  if (isCorrect) {
    score++;
  } else {
    wrongQuestions.push(q);
  }

  // Stop timer on last question
  if (currentIndex === selectedQuestions.length - 1) {
    clearInterval(timerInterval);
  }
}

// ============================================================
// 次の問題
// ============================================================
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= selectedQuestions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

// ============================================================
// 結果画面
// ============================================================
function showResult() {
  const secs = (elapsedMs / 1000).toFixed(1);

  document.getElementById('resultScore').textContent = `${score}`;
  document.getElementById('resultTime').textContent = secs;

  // Stars
  let filledStars = 3;
  if (score <= 5) filledStars = 1;
  else if (score <= 7) filledStars = 2;
  for (let i = 1; i <= 3; i++) {
    document.getElementById('star' + i).src = i <= filledStars ? 'assets/star-filled.png' : 'assets/star-empty.png';
  }

  // Mascot expression
  const resultMascotImg = score >= 8 ? 'assets/mascot-happy.png' : score >= 6 ? 'assets/mascot-normal.png' : 'assets/mascot-sad.png';
  document.getElementById('resultMascotImg').src = resultMascotImg;

  // Comment
  const comments = {
    10: ['パーフェクト！！最高だよ！全問正解すごい！', '10問全部正解！天才かも！？', 'やったー！完璧！また挑戦してね！'],
    9:  ['あと1問だったね！次は完璧だ！', 'すごい！9問正解！もう少し！', 'ほぼ完璧！次はパーフェクトねらおう！'],
    8:  ['いいね！8問正解！よく頑張った！', '8問正解！なかなかすごいよ！', '8問正解！だんだん上手くなってきてるね！'],
    7:  ['7問正解！半分以上できたよ！', 'よくできました！7問正解！', '7問正解！もっと練習したら完璧になれるよ！'],
    6:  ['6問正解！もう少し練習しよう！', 'いい感じ！間違えた問題を見てみよう！', '6問正解！また挑戦してみよう！'],
  };
  let comment;
  if (comments[score]) {
    comment = comments[score][Math.floor(Math.random() * comments[score].length)];
  } else {
    comment = '間違えた問題をよく読んで、また挑戦してみよう！きっとできるようになるよ！';
  }
  document.getElementById('resultComment').textContent = comment;

  // Wrong list (攻略ポイント)
  const wl = document.getElementById('wrongList');
  wl.innerHTML = '';
  if (wrongQuestions.length > 0) {
    wl.innerHTML = '<h3>攻略ポイント（間違えた問題をもう一度読んでみよう）</h3>';
    wrongQuestions.forEach(q => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<div>${q.text}</div><div class="correct-ans">正解：${q.answer}</div><div>${q.longExplain}</div>`;
      wl.appendChild(div);
    });
  }

  showScreen('screenResult');
}

// ============================================================
// ユーティリティ
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
